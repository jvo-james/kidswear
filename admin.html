<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>April Blossoms Admin</title>
  <style>
    :root{
      --bg:#fffaf6;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#6b7280;
      --border:rgba(15,23,42,.08);
      --pink:#ff6b8a;
      --yellow:#ffd166;
      --shadow:0 10px 30px rgba(16,24,40,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#fffaf6 0%,#fff7f0 100%);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px 16px 48px;
    }

    .hero{
      margin-bottom:20px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:32px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.5;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-top:18px;
    }

    h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    @media (min-width:700px){
      .grid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:6px;
    }

    input, textarea, button{
      width:100%;
      font:inherit;
    }

    input, textarea{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
      color:var(--text);
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(90deg,var(--pink),var(--yellow));
      color:#fff;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    #adminStatus{
      margin-top:10px;
      font-weight:700;
    }

    #adminProducts{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .product-row{
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      background:#fff;
    }

    .product-row h3{
      margin:0 0 6px;
      font-size:16px;
    }

    .product-row p{
      margin:4px 0;
      color:var(--muted);
      font-size:14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>April Blossoms Admin</h1>
      <p>Manage products, add new dresses, and control what appears on the store.</p>
    </section>

    <section class="card">
      <h2>Admin Login</h2>
      <div class="grid two">
        <div>
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" placeholder="Enter admin email" />
        </div>
        <div>
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter password" />
        </div>
      </div>
      <div style="margin-top:12px;">
        <button class="btn btn-primary" id="adminLoginBtn" type="button">Log In</button>
      </div>
      <div id="adminStatus" class="muted">Not logged in</div>
    </section>

    <section class="card">
      <h2>Add Product</h2>
      <div class="grid two">
        <div>
          <label for="productId">Product ID</label>
          <input type="text" id="productId" placeholder="e.g. DRESS-051" />
        </div>
        <div>
          <label for="productTitle">Title</label>
          <input type="text" id="productTitle" placeholder="e.g. Rose Bloom Dress" />
        </div>
        <div>
          <label for="productPrice">Price</label>
          <input type="number" id="productPrice" placeholder="e.g. 45" />
        </div>
        <div>
          <label for="productAge">Age Category</label>
          <input type="text" id="productAge" placeholder="e.g. 4-5" />
        </div>
      </div>

      <div style="margin-top:12px;">
        <label for="productDescription">Description</label>
        <textarea id="productDescription" placeholder="Write product description"></textarea>
      </div>

      <div style="margin-top:12px;">
        <label for="productImage">Image filename for now</label>
        <input type="text" id="productImage" placeholder="e.g. IMG_5750.JPG" />
      </div>

      <div style="margin-top:12px;">
        <button class="btn btn-primary" id="addProductBtn" type="button">Add Product</button>
      </div>
    </section>

    <section class="card">
      <h2>Current Products</h2>
      <p class="muted">Products from Firestore will appear here.</p>
      <div id="adminProducts"></div>
    </section>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
